name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  build-services:
    name: Build Service - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, esport-adapter, scoring, gateway]
      fail-fast: false

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Check directory existence
        id: check-dir
        run: |
          if [ -d "." ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Service directory services/${{ matrix.service }} does not exist yet. Skipping."
          fi
        shell: bash

      - name: Install dependencies
        if: steps:check-dir.outputs.exists == 'true'
        run: npm ci

      - name: Build service
        if: steps:check-dir.outputs.exists == 'true'
        run: npm run build
