name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - docker-compose.yml
      - .github/workflows/deploy-backend.yml

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment files
        run: |
          cat > .env <<'EOF'
          ESFL_DB_USER=${{ secrets.ESFL_DB_USER }}
          ESFL_DB_PASSWORD=${{ secrets.ESFL_DB_PASSWORD }}
          ESFL_DB_NAME=${{ secrets.ESFL_DB_NAME }}
          EOF

          cat > backend/.env <<'EOF'
          PORT=${{ secrets.BACKEND_PORT }}
          DATABASE_URL=${{ secrets.BACKEND_DATABASE_URL }}
          JWT_SECRET=${{ secrets.BACKEND_JWT_SECRET }}
          GOOGLE_CLIENT_ID=${{ secrets.BACKEND_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.BACKEND_GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL=${{ secrets.BACKEND_GOOGLE_CALLBACK_URL }}
          FRONTEND_URL=${{ secrets.BACKEND_FRONTEND_URL }}
          PANDASCORE_API_TOKEN=${{ secrets.BACKEND_PANDASCORE_API_TOKEN }}
          EOF

      - name: Deploy with Docker Compose
        run: docker compose up -d --build --remove-orphans